<!doctype html>
<!--
  Ticket redirect page — copy to tickets/<slug>.html when you need a live link.
  This _templates/ folder is excluded from GitHub Pages (see .github/workflows/static.yml),
  so nothing here is deployed as a public URL. A local static server that serves the whole repo
  can still open this file by path; do not link to it from the live site.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Super Cassette — [City] Tickets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
    .wrap { display: grid; place-items: center; height: 100%; text-align: center; padding: 2rem; }
    .card { max-width: 520px; border: 1px solid #ddd; padding: 1.5rem; border-radius: 12px; }
    .small { opacity: .7; font-size: .9rem; margin-top: .5rem; }
  </style>

  <!-- Meta Pixel Base Code -->
  <script>
    !(function(f,b,e,v,n,t,s){
      if(f.fbq) return; n=f.fbq=function(){ n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments) };
      if(!f._fbq) f._fbq=n; n.push=n; n.loaded=!0; n.version='2.0';
      n.queue=[]; t=b.createElement(e); t.async=!0;
      t.src=v; s=b.getElementsByTagName(e)[0]; s.parentNode.insertBefore(t,s);
    })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '1828543974753448', {
      // Optional: Advanced Matching fields if you have them
      // em: 'hashedoremail@example.com'
    });
  </script>
  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1828543974753448&ev=PageView&noscript=1"/>
  </noscript>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Hold tight — sending you to tickets…</h1>
      <p>We’re reserving your spot to see Super Cassette in <strong>[City]</strong>!</p>
      <p class="small">If you’re not redirected automatically, <a id="manual-link" href="#">click here</a>.</p>
    </div>
  </div>

  <script>
    // -------------- EDIT THESE PER SHOW --------------
    const SHOW_ID        = 'UNIQUE_ID_CITY_DATE_VENUE_SNAKE_CASE';
    const SHOW_NAME      = 'City — YYYY-MM-DD — Venue Name';
    const SHOW_CITY      = 'City';
    const SHOW_DATE      = 'YYYY-MM-DD';
    const SHOW_VENUE     = 'Venue Name';

    const DESTINATION_URL =
      'https://example.com/ticketing?utm_source=meta&utm_medium=cpc&utm_campaign=tour_YYYY&utm_content=slug';
    // -------------------------------------------------

    function appendIncomingUtms(url) {
      try {
        const incoming = new URL(window.location.href);
        const dest = new URL(url);
        ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(k=>{
          const v = incoming.searchParams.get(k);
          if (v) dest.searchParams.set(k, v);
        });
        return dest.toString();
      } catch (_) {
        return url;
      }
    }

    const finalUrl = appendIncomingUtms(DESTINATION_URL);
    document.getElementById('manual-link')?.setAttribute('href', finalUrl);

    fbq('track', 'ViewContent', {
      content_category: 'tour_ticket',
      content_type: 'event',
      content_ids: [SHOW_ID],
      content_name: SHOW_NAME,
      city: SHOW_CITY,
      venue: SHOW_VENUE,
      start_date: SHOW_DATE,
      value: 0.00,
      currency: 'USD'
    });

    setTimeout(() => {
      window.location.replace(finalUrl);
    }, 700);
  </script>
</body>
</html>
